family:
  - name: Matt
    age_group: adult
    restrictions:
      - gluten free
      - vegetarian
    preferences:
      - low/no dairy
      - spicy food
      - international
      - protein rich
      - comfort food
  - name: Lara
    age_group: adult
    restrictions:
      - flexatarian (occasional meat)
    preferences:
      - protein rich
      - spicy
      - international
      - comfort food
      - salads
      - fish
  - name: Isla
    age_group: toddler
    restrictions:
      - no added salt
      - no refined sugar
      - no whole nuts or large hard pieces (choking hazard)
    preferences:
      - finger foods
      - pasta
      - fruits
      - vegetables
    notes: >
      Toddler portion is roughly 1/4 of an adult serving.
      Note any ingredients that need different prep for Isla
      (veg cut small, sauce on the side, spice added at table for adults).

nutrition_goals:
  - complete protein in every dinner (legumes, eggs, dairy, or fish/meat for Lara)
  - at least one serving of vegetables per meal
  - whole grains preferred over refined; all grains must be gluten-free
  - healthy fats (olive oil, avocado) over saturated fats; low/no dairy
  - minimize added sugar and processed ingredients
  - toddler-friendly: iron-rich foods several times a week (lentils, beans, leafy greens, eggs)

meal_plan:
  days:
    - Monday
    - Tuesday
    - Wednesday
    - Thursday
    - Friday
    - Saturday
    - Sunday
  meal: dinner  # currently only planning dinners

prep_sessions:
  - label: Weekend Prep
    day: Sunday
    max_hours: 3
  - label: Midweek Prep
    day: Wednesday
    max_hours: 1.5
