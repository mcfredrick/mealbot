<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>Generated weekly by <a href="https://github.com/YOUR_USERNAME/mealplan">mealplan-bot</a></p>
  </footer>
</body>
</html>
